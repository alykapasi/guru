services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: guru
      POSTGRES_PASSWORD: guru123
      POSTGRES_DB: guru_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guru"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: guru_minio
      MINIO_ROOT_PASSWORD: minio_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://guru:guru123@postgres:5433/guru_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
  minio_data: